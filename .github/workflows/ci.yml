name: Deployment Pipeline

on:
  pull_request:
    types: [closed]
    branches: [dev]

# Trigger configuration
jobs:
  deploy:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'dev' # Verify if merged to 'dev'
    runs-on: ubuntu-latest

    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
      
      - name: Build app
        run: npx nx run-many --target=build ai-manager-api auth-api gig-api payments-api

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Info
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Artifact to Vercel Project
        run: vercel deploy --token=${{ secrets.VERCEL_TOKEN }}
