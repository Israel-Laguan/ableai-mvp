<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Nothing to see here...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: linear-gradient(135deg, #232526 0%, #414345 100%);
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px 30px;
            background: rgba(34, 34, 34, 0.85);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .error-code {
            font-size: 6rem;
            font-weight: bold;
            letter-spacing: 8px;
            margin-bottom: 16px;
            color: #ff6f61;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .message {
            font-size: 1.5rem;
            color: #eee;
            margin-bottom: 8px;
        }
        .subtle {
            font-size: 1rem;
            color: #bbb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <div class="message">Nothing to see here...</div>
        <div class="subtle">The page you are looking for does not exist.</div>
    </div>
</body>
</html>
