volumes:
  postgres-data: null

services:
  postgres:
    image: postgres:16.2
    volumes:
      - ./postgres:/var/lib/postgresql/data
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: 'ableai'
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'postgres'

  redis:
    image: redis:7.0.5
    container_name: redis
    ports:
      - 6379:6379

  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - '8333:8081'
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
